<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Fundamental System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#060c18; --surface:#0d1525; --surface2:#121d2e; --surface3:#172236;
  --border:#1c2d44; --border2:#243650;
  --accent:#38bdf8; --accent2:#818cf8;
  --up:#22c55e; --up2:#15803d; --down:#ef4444; --down2:#991b1b;
  --neutral:#64748b; --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
  --gold:#f59e0b;
  --sidebar:270px; --header:56px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);}

/* ══════════ HEADER ══════════ */
header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header);
  background:rgba(13,21,37,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  backdrop-filter:blur(12px);
  gap:12px;
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#38bdf8,#818cf8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 14px rgba(56,189,248,.25);}
.logo h1{font-size:14px;font-weight:700;white-space:nowrap;}
.logo p{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

/* Header strip — shows on desktop, hidden on mobile */
.h-strip{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;overflow:hidden;}
.hs-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:4px 10px;text-align:center;cursor:pointer;transition:all .15s;
  flex-shrink:0;position:relative;overflow:hidden;
}
.hs-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.hs-card.up{border-color:rgba(34,197,94,.3);}.hs-card.up::after{background:var(--up);}
.hs-card.down{border-color:rgba(239,68,68,.3);}.hs-card.down::after{background:var(--down);}
.hs-card.zero{border-color:var(--border);}.hs-card.zero::after{background:var(--neutral);}
.hs-card:hover{transform:translateY(-2px);}
.hs-card.active{border-color:var(--accent);}
.hs-flag{font-size:15px;line-height:1;}
.hs-code{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin:1px 0;}
.hs-bias{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
.hs-bias.up{color:var(--up);}.hs-bias.down{color:var(--down);}.hs-bias.zero{color:var(--neutral);}

.h-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:4px 9px;font-size:10px;color:var(--up);font-family:'JetBrains Mono',monospace;font-weight:600;}
.live-dot{width:5px;height:5px;background:var(--up);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text2);letter-spacing:1px;}

/* Hamburger — mobile only */
.menu-btn{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);}

/* ══════════ LAYOUT ══════════ */
.app{
  display:flex;
  padding-top:var(--header);
  min-height:100vh;
}

/* ══════════ SIDEBAR ══════════ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);
  border-left:1px solid var(--border);
  position:fixed;top:var(--header);bottom:0;right:0;
  overflow-y:auto;overflow-x:hidden;
  z-index:100;
  transition:transform .3s ease;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.sb-section{padding:14px 12px 6px;}
.sb-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Currency list */
.cli{display:flex;align-items:center;justify-content:space-between;padding:9px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1px solid transparent;}
.cli:hover{background:var(--surface2);border-color:var(--border);}
.cli.active{background:var(--surface3);border-color:var(--accent);}
.cli-l{display:flex;align-items:center;gap:7px;}
.cli-flag{font-size:17px;}
.cli-code{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.cli-name{font-size:9px;color:var(--text3);margin-top:1px;}
.cli-bias{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.cli-bias.up{color:var(--up);}.cli-bias.down{color:var(--down);}.cli-bias.zero{color:var(--neutral);}

/* Fixed pairs in sidebar */
.fpl{padding:9px;border-radius:9px;margin-bottom:5px;border:1px solid var(--border);background:var(--surface2);transition:all .15s;}
.fpl.buy{border-color:rgba(34,197,94,.22);background:linear-gradient(135deg,#0d1525,#061410);}
.fpl.sell{border-color:rgba(239,68,68,.22);background:linear-gradient(135deg,#0d1525,#140606);}
.fpl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.fpl-flags{display:flex;align-items:center;gap:3px;direction:ltr;font-size:13px;}
.fpl-sep{font-size:9px;color:var(--text3);}
.fpl-pname{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.fpl-dir{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.fpl-dir.buy{background:rgba(34,197,94,.12);color:var(--up);border:1px solid rgba(34,197,94,.22);}
.fpl-dir.sell{background:rgba(239,68,68,.12);color:var(--down);border:1px solid rgba(239,68,68,.22);}
.fpl-dir.neutral{background:rgba(100,116,139,.1);color:var(--neutral);border:1px solid rgba(100,116,139,.18);}
.fpl-bot{display:flex;align-items:center;justify-content:space-between;direction:ltr;}
.fpl-side{text-align:center;flex:1;}
.fpl-scode{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
.fpl-sval{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.fpl-sval.up{color:var(--up);}.fpl-sval.down{color:var(--down);}.fpl-sval.zero{color:var(--neutral);}
.fpl-divider{width:1px;height:18px;background:var(--border);}
.fpl-diff{font-size:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:700;text-align:center;margin-top:3px;}

/* ══════════ CONTENT ══════════ */
.content{
  flex:1;
  margin-right:var(--sidebar);
  padding:20px 20px 40px;
  overflow-x:hidden;
}

/* ══════════ SECTION LABEL ══════════ */
.sec-lbl{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* ══════════ BEST PAIRS ══════════ */
.best-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.best-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 13px;position:relative;transition:all .2s;}
.best-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.4);}
.best-card.r1{border-color:rgba(245,158,11,.4);background:linear-gradient(160deg,#0d1525,#110d00);box-shadow:0 0 14px rgba(245,158,11,.06);}
.best-card.r2{border-color:rgba(148,163,184,.22);}
.best-card.r3{border-color:rgba(180,120,60,.28);}
.best-rank{position:absolute;top:11px;left:11px;font-size:15px;}
.best-name{text-align:center;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:2px;margin-bottom:11px;}
.best-sides{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:11px;direction:ltr;}
.bs{text-align:center;flex:1;}
.bs-flag{font-size:19px;}
.bs-code{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text2);margin:3px 0;}
.bs-bias{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.bs-bias.up{color:var(--up);}.bs-bias.down{color:var(--down);}.bs-bias.zero{color:var(--neutral);}
.bs-vs{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.best-dir{text-align:center;padding:7px;border-radius:8px;font-size:11px;font-weight:700;margin-bottom:9px;letter-spacing:1px;}
.best-dir.buy{background:rgba(34,197,94,.1);color:var(--up);border:1px solid rgba(34,197,94,.2);}
.best-dir.sell{background:rgba(239,68,68,.1);color:var(--down);border:1px solid rgba(239,68,68,.2);}
.best-bar-row{display:flex;align-items:center;gap:6px;}
.best-bar-lbl{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.best-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.best-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.best-bar-pct{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);min-width:26px;text-align:left;}

/* ══════════ CURRENCIES GRID ══════════ */
.cur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cur-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .2s;}
.cur-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 7px 18px rgba(0,0,0,.35);}
.cur-card.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.12);}
.cur-head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--border);}
.cur-left{display:flex;align-items:center;gap:7px;}
.cur-flag{font-size:19px;}
.cur-code{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.cur-name{font-size:8px;color:var(--text3);margin-top:1px;}
.cur-bias{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.cur-bias.up{color:var(--up);}.cur-bias.down{color:var(--down);}.cur-bias.zero{color:var(--neutral);}
.cur-body{padding:9px 12px;}
.mini-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.mini-row:last-child{margin-bottom:0;}
.mini-key{font-size:7px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-width:90px;}
.mini-bar{flex:1;height:3px;background:var(--surface2);border-radius:2px;position:relative;overflow:hidden;}
.mini-fill{height:100%;border-radius:2px;position:absolute;}
.mini-val{font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:30px;text-align:left;}
.mini-val.up{color:var(--up);}.mini-val.down{color:var(--down);}.mini-val.zero{color:var(--neutral);}

/* ══════════ DETAIL PANEL ══════════ */
.detail-panel{max-width:820px;}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;transition:all .2s;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{background:var(--border2);color:var(--text);}
.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px 20px;}
.detail-left{display:flex;align-items:center;gap:12px;}
.detail-flag{font-size:40px;}
.detail-name h2{font-size:19px;font-weight:700;}
.detail-name p{font-size:10px;color:var(--text2);margin-top:2px;}
.detail-bias-box{text-align:center;}
.detail-bias-num{font-size:46px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
.detail-bias-num.up{color:var(--up);}.detail-bias-num.down{color:var(--down);}.detail-bias-num.zero{color:var(--neutral);}
.detail-bias-lbl{font-size:8px;color:var(--text3);margin-top:3px;letter-spacing:1px;}
.meter-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 18px;margin-bottom:11px;}
.meter-lbl{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:9px;}
.meter-track{height:8px;background:var(--surface2);border-radius:4px;position:relative;}
.meter-fill{height:100%;border-radius:4px;position:absolute;transition:all .6s ease;}
.meter-center{position:absolute;left:50%;top:-3px;width:2px;height:14px;background:var(--border2);transform:translateX(-50%);}
.meter-lbls{display:flex;justify-content:space-between;margin-top:6px;font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.events-wrap{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.events-head{display:grid;grid-template-columns:140px 1fr 65px 120px;padding:9px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.7px;}
.events-head span:not(:first-child){text-align:center;}
.event-row{display:grid;grid-template-columns:140px 1fr 65px 120px;padding:11px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .12s;}
.event-row:last-child{border-bottom:none;}
.event-row:hover{background:rgba(255,255,255,.02);}
.ev-driver{font-size:12px;font-weight:600;}
.ev-news{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.ev-weight{text-align:center;font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.ev-btns{display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-plus,.btn-minus,.btn-zero{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:'JetBrains Mono',monospace;}
.btn-plus{background:rgba(34,197,94,.1);color:var(--up);border:1px solid rgba(34,197,94,.2);}
.btn-minus{background:rgba(239,68,68,.1);color:var(--down);border:1px solid rgba(239,68,68,.2);}
.btn-zero{background:rgba(100,116,139,.1);color:var(--neutral);border:1px solid rgba(100,116,139,.18);font-size:11px;}
.btn-plus:hover{background:rgba(34,197,94,.28);transform:scale(1.1);}
.btn-minus:hover{background:rgba(239,68,68,.28);transform:scale(1.1);}
.btn-zero:hover{background:rgba(100,116,139,.28);transform:scale(1.1);}
.btn-plus.active{background:var(--up);color:#000;box-shadow:0 0 10px rgba(34,197,94,.5);}
.btn-minus.active{background:var(--down);color:#fff;box-shadow:0 0 10px rgba(239,68,68,.5);}
.btn-zero.active{background:var(--neutral);color:#fff;}
.ev-score{text-align:center;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.ev-score.up{color:var(--up);}.ev-score.down{color:var(--down);}.ev-score.zero{color:var(--neutral);}
.total-row{display:grid;grid-template-columns:140px 1fr 65px 120px;padding:13px 16px;background:var(--surface2);border-top:2px solid var(--border);align-items:center;}
.total-label{font-size:13px;font-weight:700;}
.total-score{text-align:center;font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.total-score.up{color:var(--up);}.total-score.down{color:var(--down);}.total-score.zero{color:var(--neutral);}

/* ══════════ MOBILE BIAS STRIP ══════════ */
.mob-strip{display:none;overflow-x:auto;padding:10px 16px;gap:8px;-webkit-overflow-scrolling:touch;}
.mob-strip::-webkit-scrollbar{display:none;}
.mob-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;flex-shrink:0;min-width:60px;position:relative;overflow:hidden;transition:all .15s;}
.mob-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.mob-card.up{border-color:rgba(34,197,94,.3);}.mob-card.up::after{background:var(--up);}
.mob-card.down{border-color:rgba(239,68,68,.3);}.mob-card.down::after{background:var(--down);}
.mob-card.zero{border-color:var(--border);}.mob-card.zero::after{background:var(--neutral);}
.mob-card.active{border-color:var(--accent);}
.mob-flag{font-size:18px;}
.mob-code{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin:2px 0;}
.mob-bias{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.mob-bias.up{color:var(--up);}.mob-bias.down{color:var(--down);}.mob-bias.zero{color:var(--neutral);}

/* ══════════ MOBILE FIXED PAIRS ══════════ */
.mob-fp-grid{display:none;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;}
.mob-fp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;position:relative;overflow:hidden;}
.mob-fp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.mob-fp-card.buy{border-color:rgba(34,197,94,.3);background:linear-gradient(160deg,#0d1525,#071410);}
.mob-fp-card.buy::before{background:var(--up);}
.mob-fp-card.sell{border-color:rgba(239,68,68,.3);background:linear-gradient(160deg,#0d1525,#140606);}
.mob-fp-card.sell::before{background:var(--down);}
.mob-fp-card.neutral::before{background:var(--neutral);}
.mob-fp-flags{display:flex;align-items:center;justify-content:center;gap:4px;direction:ltr;font-size:18px;margin-bottom:4px;}
.mob-fp-sep{font-size:11px;color:var(--text3);}
.mob-fp-name{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:8px;letter-spacing:1px;}
.mob-fp-dir{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:8px;width:100%;justify-content:center;}
.mob-fp-dir.buy{background:rgba(34,197,94,.12);color:var(--up);border:1px solid rgba(34,197,94,.25);}
.mob-fp-dir.sell{background:rgba(239,68,68,.12);color:var(--down);border:1px solid rgba(239,68,68,.25);}
.mob-fp-dir.neutral{background:rgba(100,116,139,.1);color:var(--neutral);border:1px solid rgba(100,116,139,.2);}
.mob-fp-compare{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;margin-bottom:5px;direction:ltr;}
.mob-fp-side{text-align:center;flex:1;}
.mob-fp-scode{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.mob-fp-sval{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.mob-fp-sval.up{color:var(--up);}.mob-fp-sval.down{color:var(--down);}.mob-fp-sval.zero{color:var(--neutral);}
.mob-fp-div{width:1px;height:22px;background:var(--border);}
.mob-fp-diff{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.mob-fp-diff span{color:var(--accent);font-weight:700;}

/* ══════════ MOBILE ALL GRID ══════════ */
.mob-cur-grid{display:none;grid-template-columns:1fr;gap:10px;}

/* ══════════ OVERLAY ══════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}
.overlay.show{display:block;}


/* ══════════ TOP 5 PAIRS ══════════ */
.top5-section{ margin-bottom:24px; }
.top5-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }

.top5-card{
  border-radius:14px; padding:16px 12px;
  text-align:center; position:relative;
  overflow:hidden; transition:all .25s;
  border:1px solid var(--border);
  background:var(--surface);
  cursor:default;
}

.top5-card::before{
  content:''; position:absolute;
  top:0;left:0;right:0; height:4px;
}

.top5-card.buy{
  background:linear-gradient(160deg,#0d1525,#071810);
  border-color:rgba(34,197,94,.4);
}
.top5-card.buy::before{ background:linear-gradient(90deg,var(--up2),var(--up)); }

.top5-card.sell{
  background:linear-gradient(160deg,#0d1525,#180707);
  border-color:rgba(239,68,68,.4);
}
.top5-card.sell::before{ background:linear-gradient(90deg,var(--down),var(--down2)); }

.top5-card:hover{ transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.5); }

.top5-rank{
  position:absolute; top:10px; left:10px;
  font-size:16px;
}

.top5-flags{
  display:flex; align-items:center; justify-content:center;
  gap:4px; margin-bottom:8px; direction:ltr;
  font-size:22px;
}
.top5-sep{ font-size:13px; color:var(--text3); font-family:'JetBrains Mono',monospace; }

.top5-name{
  font-size:14px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1.5px; margin-bottom:10px;
}

.top5-dir{
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:9px; border-radius:9px;
  font-size:15px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:1px; margin-bottom:10px;
}
.top5-dir.buy{ background:rgba(34,197,94,.14); color:var(--up); border:1px solid rgba(34,197,94,.28); }
.top5-dir.sell{ background:rgba(239,68,68,.14); color:var(--down); border:1px solid rgba(239,68,68,.28); }

.top5-compare{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:8px; margin-bottom:8px;
  direction:ltr;
}
.top5-side{ text-align:center; flex:1; }
.top5-scode{ font-size:8px; color:var(--text3); font-family:'JetBrains Mono',monospace; margin-bottom:3px; }
.top5-sval{ font-size:14px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.top5-sval.up{ color:var(--up); }
.top5-sval.down{ color:var(--down); }
.top5-sval.zero{ color:var(--neutral); }
.top5-sdiv{ width:1px; height:26px; background:var(--border); }

.top5-bar-row{ display:flex; align-items:center; gap:6px; }
.top5-bar-lbl{ font-size:8px; color:var(--text3); font-family:'JetBrains Mono',monospace; white-space:nowrap; }
.top5-bar{ flex:1; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.top5-bar-fill{ height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .6s ease; }
.top5-bar-pct{ font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--accent); min-width:28px; text-align:left; }

/* mobile top5 */
@media(max-width:900px){ .top5-grid{ grid-template-columns:repeat(3,1fr); } }
@media(max-width:700px){ .top5-grid{ grid-template-columns:repeat(2,1fr); gap:8px; } }

/* ══════════ UTILITIES ══════════ */
.hidden{display:none!important;}
.mt{margin-top:22px;}

/* ══════════ DESKTOP RESPONSIVE ══════════ */
@media(max-width:1200px){
  .cur-grid{grid-template-columns:repeat(3,1fr);}
  .best-grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:900px){
  .cur-grid{grid-template-columns:repeat(2,1fr);}
  .best-grid{grid-template-columns:repeat(2,1fr);}
  :root{--sidebar:240px;}
}

/* ══════════ MOBILE ══════════ */
@media(max-width:700px){
  /* Header */
  .h-strip{display:none;}
  .menu-btn{display:flex;}
  .logo p{display:none;}

  /* Sidebar becomes drawer */
  .sidebar{
    transform:translateX(100%);
    width:80%;max-width:300px;
  }
  .sidebar.open{transform:translateX(0);}

  /* Content full width */
  .content{margin-right:0;padding:12px 12px 40px;}

  /* Show mobile elements */
  .mob-strip{display:flex;}
  .mob-fp-grid{display:grid;}
  .mob-cur-grid{display:grid;}

  /* Hide desktop elements in content */
  .best-grid,.cur-grid{display:none;}

  /* Detail panel */
  .events-head{display:none;}
  .event-row{grid-template-columns:1fr 110px;grid-template-rows:auto auto;gap:5px;padding:10px 14px;}
  .ev-weight{display:none;}
  .detail-head{flex-direction:column;align-items:flex-start;gap:10px;}
  .detail-bias-box{align-self:stretch;text-align:center;}
}

const FP=[
  {base:'AUD',quote:'JPY',bF:'🇦🇺',qF:'🇯🇵'},
  {base:'EUR',quote:'JPY',bF:'🇪🇺',qF:'🇯🇵'},
  {base:'CAD',quote:'JPY',bF:'🇨🇦',qF:'🇯🇵'},
  {base:'USD',quote:'JPY',bF:'🇺🇸',qF:'🇯🇵'},
  {base:'GBP',quote:'JPY',bF:'🇬🇧',qF:'🇯🇵'},
  {base:'NZD',quote:'JPY',bF:'🇳🇿',qF:'🇯🇵'},
  {base:'EUR',quote:'USD',bF:'🇪🇺',qF:'🇺🇸'},
];

let cur=null;
const g=id=>document.getElementById(id);
const B=c=>c.events.reduce((s,e)=>s+(e.state*e.weight),0);
const C=v=>v>0?'up':v<0?'down':'zero';
const F=v=>v>0?'+'+v+'%':v<0?v+'%':'0%';
const GC=code=>DATA.find(c=>c.code===code);

// CLOCK
setInterval(()=>{
  const n=new Date();
  g('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
},1000);

// MOBILE SIDEBAR
function toggleSidebar(){
  g('sidebar').classList.toggle('open');
  g('overlay').classList.toggle('show');
}
function closeSidebar(){
  g('sidebar').classList.remove('open');
  g('overlay').classList.remove('show');
}

// HEADER STRIP (desktop)
function rStrip(){
  g('hStrip').innerHTML=DATA.map((c,i)=>{
    const b=B(c),cl=C(b);
    return `<div class="hs-card ${cl} ${cur===i?'active':''}" onclick="showDetail(${i})">
      <div class="hs-flag">${c.flag}</div><div class="hs-code">${c.code}</div>
      <div class="hs-bias ${cl}">${F(b)}</div></div>`;
  }).join('');
}

// MOBILE STRIP
function rMobStrip(){
  g('mobStrip').innerHTML=DATA.map((c,i)=>{
    const b=B(c),cl=C(b);
    return `<div class="mob-card ${cl} ${cur===i?'active':''}" onclick="showDetail(${i})">
      <div class="mob-flag">${c.flag}</div><div class="mob-code">${c.code}</div>
      <div class="mob-bias ${cl}">${F(b)}</div></div>`;

// SIDEBAR CURRENCY LIST
function rCurList(){

    const b=B(c),cl=C(b);
    return `<div class="cli ${cur===i?'active':''}" onclick="showDetail(${i});closeSidebar()">
      <div class="cli-l"><div class="cli-flag">${c.flag}</div>
      <div><div class="cli-code">${c.code}</div><div class="cli-name">${c.name}</div></div></div>
      <div class="cli-bias ${cl}">${F(b)}</div></div>`;
  }).join('');
}

// SIDEBAR FIXED PAIRS
function rFpList(){
  g('fpList').innerHTML=FP.map(p=>{
    const bC=GC(p.base),qC=GC(p.quote);
    if(!bC||!qC)return'';
    const bb=B(bC),qb=B(qC),diff=bb-qb;
    let lbl,dc,ic;
    if(diff>0){lbl='BUY';dc='buy';ic='▲';}
    else if(diff<0){lbl='SELL';dc='sell';ic='▼';}
    else{lbl='محايد';dc='neutral';ic='→';}
    return `<div class="fpl ${dc}">
      <div class="fpl-top">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="fpl-flags"><span>${p.bF}</span><span class="fpl-sep">/</span><span>${p.qF}</span></div>
          <div class="fpl-pname">${p.base}/${p.quote}</div>
        </div>
        <div class="fpl-dir ${dc}">${ic} ${lbl}</div>
      </div>
      <div class="fpl-bot">
        <div class="fpl-side"><div class="fpl-scode">${p.base}</div><div class="fpl-sval ${C(bb)}">${F(bb)}</div></div>
        <div class="fpl-divider"></div>
        <div class="fpl-side"><div class="fpl-scode">${p.quote}</div><div class="fpl-sval ${C(qb)}">${F(qb)}</div></div>
      </div>
      <div class="fpl-diff">الفرق: ${Math.abs(diff)}%</div>
    </div>`;
  }).join('');
}

// MOBILE FIXED PAIRS

// TOP 5 PAIRS
function rTop5(){
  const bi=DATA.map(c=>({code:c.code,flag:c.flag,bias:B(c)}));
  const pairs=[];
  for(let i=0;i<bi.length;i++)for(let j=i+1;j<bi.length;j++){
    const a=bi[i],b=bi[j],d=Math.abs(a.bias-b.bias);
    if(d===0)continue;
    let base,quote,dir,bF,qF,dc;
    if(a.bias>b.bias){base=a;quote=b;dir='BUY '+a.code+'/'+b.code;bF=a.flag;qF=b.flag;dc='buy';}
    else{base=b;quote=a;dir='BUY '+b.code+'/'+a.code;bF=b.flag;qF=a.flag;dc='buy';}
    // if base is weaker than quote it is actually SELL base/quote
    pairs.push({a,b,diff:d,dir,bF,qF,dc,base,quote});
  }
  pairs.sort((x,y)=>y.diff-x.diff);
  const top5=pairs.slice(0,5),mx=top5[0]?.diff||1;
  const em=['🥇','🥈','🥉','4️⃣','5️⃣'];
  g('top5Grid').innerHTML=top5.map((p,i)=>{
    const sp=Math.round((p.diff/mx)*100);
    const aCls=C(p.a.bias),bCls=C(p.b.bias);
    return `<div class="top5-card ${p.dc}">
      <div class="top5-rank">${em[i]}</div>
      <div class="top5-flags"><span>${p.bF}</span><span class="top5-sep">/</span><span>${p.qF}</span></div>
      <div class="top5-name">${p.dir.replace('BUY ','')}</div>
      <div class="top5-dir ${p.dc}">📈 ${p.dir}</div>
      <div class="top5-compare">
        <div class="top5-side"><div class="top5-scode">${p.a.code}</div><div class="top5-sval ${aCls}">${F(p.a.bias)}</div></div>
        <div class="top5-sdiv"></div>
        <div class="top5-side"><div class="top5-scode">${p.b.code}</div><div class="top5-sval ${bCls}">${F(p.b.bias)}</div></div>
      </div>
      <div class="top5-bar-row">
        <div class="top5-bar-lbl">STRENGTH</div>
        <div class="top5-bar"><div class="top5-bar-fill" style="width:${sp}%"></div></div>
        <div class="top5-bar-pct">${sp}%</div>
      </div>
    </div>`;
  }).join('');
}

// BEST AUTO PAIRS
function rBest(){
  const bi=DATA.map(c=>({code:c.code,flag:c.flag,bias:B(c)}));
  const pairs=[];
  for(let i=0;i<bi.length;i++)for(let j=i+1;j<bi.length;j++){
    const a=bi[i],b=bi[j],d=Math.abs(a.bias-b.bias);
    if(d===0)continue;
    let dir;
    if(a.bias>b.bias)dir='BUY '+a.code+'/'+b.code;
    else dir='BUY '+b.code+'/'+a.code;
    pairs.push({a,b,diff:d,dir});
  }
  pairs.sort((x,y)=>y.diff-x.diff);
  const top=pairs.slice(0,6),mx=top[0]?.diff||1;
  const em=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  g('bestGrid').innerHTML=top.map((p,i)=>{
    const sp=Math.round((p.diff/mx)*100),rc=i<3?`r${i+1}`:'';
    return `<div class="best-card ${rc}">
      <div class="best-rank">${em[i]}</div>
      <div class="best-name">${p.dir.replace('BUY ','')}</div>
      <div class="best-sides">
        <div class="bs"><div class="bs-flag">${p.a.flag}</div><div class="bs-code">${p.a.code}</div><div class="bs-bias ${C(p.a.bias)}">${F(p.a.bias)}</div></div>
        <div class="bs-vs">VS</div>
        <div class="bs"><div class="bs-flag">${p.b.flag}</div><div class="bs-code">${p.b.code}</div><div class="bs-bias ${C(p.b.bias)}">${F(p.b.bias)}</div></div>
      </div>
      <div class="best-dir buy">📈 ${p.dir}</div>
      <div class="best-bar-row">
        <div class="best-bar-lbl">STRENGTH</div>
        <div class="best-bar"><div class="best-bar-fill" style="width:${sp}%"></div></div>
        <div class="best-bar-pct">${sp}%</div>
      </div>
    </div>`;
  }).join('');
}

// CURRENCIES GRID (desktop + mobile)
function rCurGrids(){
  const html=DATA.map((c,i)=>{
    const b=B(c),cl=C(b);
    const rows=c.events.map(e=>{
      const sc=e.state*e.weight,ecl=C(sc),pct=Math.abs(sc)/e.weight*100;
      const fs=sc>0?`background:var(--up);width:${pct/2}%;left:50%;`:sc<0?`background:var(--down);width:${pct/2}%;right:50%;`:'';
      return `<div class="mini-row"><div class="mini-key">${e.news}</div><div class="mini-bar"><div class="mini-fill" style="${fs}"></div></div><div class="mini-val ${ecl}">${F(sc)}</div></div>`;
    }).join('');
    return `<div class="cur-card ${cur===i?'active':''}" onclick="showDetail(${i})">
      <div class="cur-head"><div class="cur-left"><div class="cur-flag">${c.flag}</div><div><div class="cur-code">${c.code}</div><div class="cur-name">${c.name}</div></div></div><div class="cur-bias ${cl}">${F(b)}</div></div>
      <div class="cur-body">${rows}</div>
    </div>`;
  }).join('');
  g('curGrid').innerHTML=html;
  g('mobCurGrid').innerHTML=html;
}

// DETAIL
function rDetail(){
  const c=DATA[cur],b=B(c),cl=C(b);
  g('dFlag').textContent=c.flag;
  g('dName').textContent=c.code+' — '+c.name;
  g('dTrend').textContent=c.trend;
  const bn=g('dBiasNum');bn.textContent=F(b);bn.className='detail-bias-num '+cl;
  const mf=g('mFill'),pct=Math.abs(b);
  if(b>0){mf.style.left='50%';mf.style.right='auto';mf.style.width=(pct/2)+'%';mf.style.background='linear-gradient(90deg,var(--up2),var(--up))';}
  else if(b<0){mf.style.right='50%';mf.style.left='auto';mf.style.width=(pct/2)+'%';mf.style.background='linear-gradient(90deg,var(--down),var(--down2))';}
  else{mf.style.width='0%';}
  g('eventsBody').innerHTML=c.events.map((e,ei)=>{
    const sc=e.state*e.weight,ecl=C(sc);
    return `<div class="event-row">
      <div><div class="ev-driver">${e.driver}</div><div class="ev-news">${e.news}</div></div>
      <div></div><div class="ev-weight">${e.weight}%</div>
      <div><div class="ev-btns">
        <button class="btn-plus ${e.state===1?'active':''}" onclick="setState(${ei},1)">+</button>
        <button class="btn-zero ${e.state===0?'active':''}" onclick="setState(${ei},0)">◼</button>
        <button class="btn-minus ${e.state===-1?'active':''}" onclick="setState(${ei},-1)">−</button>
        <div class="ev-score ${ecl}">${F(sc)}</div>
      </div></div>
    </div>`;
  }).join('');
  const ts=g('totalScore');ts.textContent=F(b);ts.className='total-score '+cl;
}

function setState(ei,state){
  DATA[cur].events[ei].state=state;
  renderAll();rDetail();
}

function showDetail(i){
  cur=i;
  g('dashView').classList.add('hidden');
  g('detailView').classList.remove('hidden');
  renderAll();rDetail();
  closeSidebar();
}

function showDash(){
  cur=null;
  g('detailView').classList.add('hidden');
  g('dashView').classList.remove('hidden');
  renderAll();
}

function renderAll(){
  rStrip();rMobStrip();rCurList();rFpList();rMobFp();rTop5();rBest();rCurGrids();
}

renderAll();
</script>
</body>
</html>
